rules:
  - id: pull-request-target-needs-exception
    languages:
      - yaml
    severity: ERROR
    message: >-
      pull_request_target runs with target-repository privileges. Use pull_request or obtain an explicit security exception.
    metadata:
      category: best-practice
      confidence: HIGH
      impact: HIGH
      likelihood: MEDIUM
      references:
        - https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/
      technology:
        - github-actions
    patterns:
      - pattern-inside: "{on: ...}"
      - pattern: pull_request_target
